<!DOCTYPE html>
<html>
<head>
    <title>AJAX Form Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 class="mb-4">Student Information</h2>

    <!-- Button -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#formModal">
        Fill Form
    </button>

    <!-- Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Number</th>
                <th>Email</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

</div>

<!-- Modal Form -->
<div class="modal fade" id="formModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Fill Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="text" id="name" class="form-control mb-2" placeholder="Name">
        <input type="number" id="number" class="form-control mb-2" placeholder="Number">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="number" id="age" class="form-control mb-2" placeholder="Age">
        <input type="text" id="city" class="form-control mb-2" placeholder="City">

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitData()">Submit</button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function submitData() {

    // Get values
    let name = document.getElementById("name").value;
    let number = document.getElementById("number").value;
    let email = document.getElementById("email").value;
    let age = document.getElementById("age").value;
    let city = document.getElementById("city").value;

    // AJAX simulation (no reload)
    let row = `<tr>
        <td>${name}</td>
        <td>${number}</td>
        <td>${email}</td>
        <td>${age}</td>
        <td>${city}</td>
    </tr>`;

    document.getElementById("tableBody").innerHTML += row;

    // Clear form
    document.getElementById("name").value = "";
    document.getElementById("number").value = "";
    document.getElementById("email").value = "";
    document.getElementById("age").value = "";
    document.getElementById("city").value = "";

    // Close modal
    let modal = bootstrap.Modal.getInstance(document.getElementById('formModal'));
    modal.hide();
}

</script>

</body>
</html>
