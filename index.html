<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background-color: #f5f6fa; }
.sidebar {
    height: 100vh;
    background: #2c3e50;
    color: white;
    position: fixed;
    width: 220px;
}
.sidebar a {
    color: white;
    display: block;
    padding: 12px;
    text-decoration: none;
}
.sidebar a:hover { background: #1abc9c; }
.main {
    margin-left: 230px;
    padding: 20px;
}
.card { border-radius: 15px; }
.product-img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    border-radius: 10px;
}
.chart-container {
    height: 300px; /* control chart size */
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4>Dashboard</h4>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Analytics</a>
    <a href="#">Settings</a>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard</h2>
        <input type="text" class="form-control w-25" placeholder="Search...">
    </div>

    <!-- Products Section -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-2">
                <img src="iphone17promaax.jpeg" class="card-img-top product-img">
                <div class="card-body text-center">
                    <h6>iPhone 17Pro max</h6>
                    <p>₹1,49,900</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-2">
                <img src="iphon16 promax.jpeg" class="card-img-top product-img">
                <div class="card-body text-center">
                    <h6>iPhone 16 Pro max</h6>
                    <p>₹1,19,999</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-2">
                <img src="iphon16.jpeg" class="card-img-top product-img">
                <div class="card-body text-center">
                    <h6>iPhone 16</h6>
                    <p>₹69,900</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-2">
                <img src="iphone15.jpeg" class="card-img-top product-img">
                <div class="card-body text-center">
                    <h6>iPhone 15</h6>
                    <p>₹59,900</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Graphs -->
    <div class="row mt-5">

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Sales Overview</h5>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Product Distribution</h5>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
// Bar Chart
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr'],
        datasets: [{
            label: 'Sales',
            data: [120, 190, 300, 250]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// Pie Chart (fixed size)
new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: ['iphone 17 Pro max', 'iPhone 16 Pro max', 'iPhone 16', 'iPhone 15'],
        datasets: [{
            data: [40, 30, 20, 10]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

</body>
</html>
